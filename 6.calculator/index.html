<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator
  </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <div id="display">
      <input type="text" id="result" placeholder="0" readonly>
    </div>
    <div class="btns">
      <button class="btn operator" id="l-bracket" value="(">(</button>
      <button class="btn operator" id="r-bracket" value=")">)</button>
      <button class="btn operator" id="percent" value="%">%</button>
      <button class="btn operator" id="AC" data-action="clear">AC</button>

      <button class="btn nunBtn" id="no7" value="7">7</button>
      <button class="btn nunBtn" id="no8" value="8">8</button>
      <button class="btn nunBtn" id="no9" value="9">9</button>
      <button class="btn operator" value="+">+</button>

      <button class="btn nunBtn" id="no4" value="4">4</button>
      <button class="btn nunBtn" id="no5" value="5">5</button>
      <button class="btn nunBtn" id="no6" value="6">6</button>
      <button class="btn operator" value="-">-</button>

      <button class="btn nunBtn" id="no1" value="1">1</button>
      <button class="btn nunBtn" id="no2" value="2">2</button>
      <button class="btn nunBtn" id="no3" value="3">3</button>
      <button class="btn operator" value="/">/</button>

      <button class="btn nunBtn" id="no0" value="0">0</button> 
      <button class="btn additional" id="dot" value=".">.</button>
      <button class="btn additional" id="equalTo" value="=">=</button>
      <button class="btn operator" value="*">*</button>
   
  </div>
  <script src="logic.js"></script>
</body>
</html>
